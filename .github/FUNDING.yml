# community_bridge: # Community Bridge
# liberapay: # Liberapay
# issuehunt: # IssueHunt
# otechie: # Otechie
# lfx_coding: # LFX Crowdfunding
# custom: # 自定义赞助链接（数组）

custom: ["https://github.com/linjoin/Tarn#-致谢"]
