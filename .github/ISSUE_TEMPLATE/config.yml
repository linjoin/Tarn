# Issue 模板配置
# 参考: https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository#configuring-the-template-chooser

blank_issues_enabled: false
contact_links:
  - name: 📖 文档
    url: https://github.com/linjoin/Tarn/blob/main/docs/FAQ.md
    about: 请先查阅 FAQ，90% 的常见问题已有答案
  - name: 🔒 安全漏洞报告
    url: https://github.com/linjoin/Tarn/security/advisories/new
    about: 发现安全漏洞？请勿公开 Issue，通过 private security advisory 报告
  - name: 💼 商业授权
    url: https://github.com/linjoin/Tarn/issues/new?labels=commercial&title=[COMMERCIAL]+商业授权咨询
    about: 商业使用授权咨询
  - name: 💬 社区讨论
    url: https://github.com/linjoin/Tarn/discussions
    about: 使用心得、经验分享、非 Bug 非 Feature 的讨论（如已开启 Discussions）
